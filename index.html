<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Check weather and air quality in one place. This app shows current weather, AQI, and a 5-day forecast. Search by city or use your location for quick and easy updates.">
    <meta name="keywords"
        content="weather app, air quality, AQI, weather and AQI, weather forecast, 5 day forecast, check weather, city weather, location based weather, temperature, humidity, wind, simple weather app">
    <meta name="author" content="Nazrul Hasan">
    <meta name="robots" content="index, follow">
    <script src="./src/script.js" type="module" defer></script>
    <link rel="preload" as="image" href="./src/images/clear.webp">
    <link rel="stylesheet" href="./src/output.css" />
    <title>Weather & Air Quality App | Simple Weather and AQI Check</title>
    <link rel="icon" type="image/x-icon" href="./src/images/favicon.ico" />
</head>

<body>
    <!--Header -->
    <header class="container mx-auto flex items-center justify-between gap-5 flex-wrap pt-5 pb-2 px-5 md:px-10
    md:py-5">
        <img src="./src/images/logo.webp" alt="Weather & Air Quality App Logo"
            class="h-9 w-auto sm:h-12 drop-shadow-xl" />
        <form method="post" id="search-weather"
            class="bg-white inline-flex items-center gap-4 rounded-2xl px-1 py-1 shadow-xl order-3 w-[100%] xl:order-2 xl:w-auto">
            <img src="./src/images/icons/Search.svg" alt="search Icon" class="w-5 h-5 ml-3 sm:w-6 sm:h-6" />
            <input type="search" id="city-name" name="city-name" required placeholder="Search for a city..."
                class="w-[100%] outline-none xl:w-100 text-sm sm:text-[1rem]" />
            <button type="submit"
                class="bg-primary px-5 py-2 rounded-2xl text-white font-semibold cursor-pointer sm:px-6 sm:py-3">Search</button>
        </form>
        <div id="current-location"
            class="rounded-2xl bg-white px-2 py-3 text-sm text-black cursor-pointer font-semibold inline-flex items-center gap-2 shadow-xl order-2 xl:order-3 sm:px-6 sm:text-[1rem]">
            <img src="./src/images/icons/Location.svg" alt="Location Icon" class="h-5 w-5 sm:h-8 sm:w-8" />
            Current Location
        </div>
    </header>

    <!-- Main Content-->
    <main>
        <!-- Here is the background image Section -->
        <div id="background-image-static">
            <img src="./src/images/clear.webp" alt="Weather" class="fixed top-0 left-0 min-h-screen w-full z-[-1]"
                role="presentation" aria-hidden="true">
        </div>

        <!-- Here is the recent searches section -->
        <section id="recent-search-static"
            class="container mx-auto flex items-start justify-start gap-x-5 gap-y-3 mt-3 flex-col overflow-hidden md:mt-5 md:px-10 md:flex-row md:items-center">
            <p class="text-base font-semibold px-5 md:px-0 text-white mix-blend-difference text-nowrap">Recent Searches
            </p>

            <!-- Recent searches will be populated here -->
            <div id="recent-search"
                class="inline-flex items-center flex-nowrap gap-3 overflow-x-auto overflow-y-hidden whitespace-nowrap pl-5 w-full md:pl-0">
            </div>
        </section>

        <!-- Here is the weather information section -->
        <section class="container mx-auto px-5 md:px-10">
            <div id="alert-static" role="alert"></div>
            <div class=" grid grid-cols-1 gap-5 mt-5 lg:grid-cols-2">
                <div class="rounded-2xl bg-secondary/75 backdrop-blur-sm border border-solid border-white/25 p-7">
                    <div class="flex justify-between gap-5 flex-col sm:flex-row sm:items-center">
                        <div class="inline-flex gap-3 items-center order-2 sm:order-1">
                            <img src="./src/images/icons/Weather_Location.svg" alt="Location Icon" class="h-6 w-6" />
                            <h3 class="text-lg font-medium text-white" data-location="current.location"></h3>
                        </div>
                        <div class="inline-flex items-center text-black rounded-2xl order-1 sm:order-2"
                            id="temperature-toggle">
                            <button
                                class="bg-white text-black px-4 py-3 rounded-tl-2xl rounded-bl-2xl font-semibold cursor-pointer"
                                data-temperature-format="celsius">&deg;C</button>
                            <button
                                class="bg-white text-black px-4 py-3 rounded-tr-2xl rounded-br-2xl font-semibold cursor-pointer"
                                data-temperature-format="fahrenheit">&deg;F</button>
                        </div>
                    </div>
                    <p class="text-sm text-white" data-location="current.dt"></p>
                    <div class="flex items-center justify-between gap-5 mt-5">
                        <div>
                            <h1 class="text-5xl font-semibold text-white sm:text-8xl" data-location="current.main.temp"
                                id="temp-format"></h1>
                            <p class="capitalize text-lg text-white sm:text-xl"
                                data-location="current.weather[0].description"></p>
                        </div>
                        <div class="w-25 h-25 overflow-hidden flex items-center justify-center sm:w-45 sm:h-45">
                            <img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw=="
                                alt="Weather Icon" class="scale-120" data-location="current.weather[0].iconUrl"
                                loading="lazy" />
                        </div>
                    </div>
                    <div class="mt-7 flex items-start gap-6 flex-wrap sm:justify-between lg:justify-start">
                        <div class="inline-flex items-center gap-3">
                            <img src="./src/images/icons/Feels_Like.svg" alt="Feels Like icon" class="w-7 h-7">
                            <div class="text-white">
                                <span class="text-sm">Feels Like</span>
                                <p class="text-lg sm:text-xl" data-location="current.main.feels_like" id="temp-format">
                                </p>
                            </div>
                        </div>
                        <div class="inline-flex items-center gap-3">
                            <img src="./src/images/icons/Humidity.svg" alt="Humidity icon" class="w-7 h-7">
                            <div class="text-white">
                                <span class="text-sm">Humidity</span>
                                <p class="text-lg sm:text-xl"><span data-location="current.main.humidity"></span>%</p>
                            </div>
                        </div>
                        <div class="inline-flex items-center gap-3">
                            <img src="./src/images/icons/Wind.svg" alt="Wind icon" class="w-7 h-7">
                            <div class="text-white">
                                <span class="text-sm">Wind</span>
                                <p class="text-lg sm:text-xl"><span data-location="current.wind.speed"></span> km/h</p>
                            </div>
                        </div>
                        <div class="inline-flex items-center gap-3">
                            <img src="./src/images/icons/Visibility.svg" alt="Visibility icon" class="w-7 h-7">
                            <div class="text-white">
                                <span class="text-sm">Visibility</span>
                                <p class="text-lg sm:text-xl"><span data-location="current.visibility"></span> km</p>
                            </div>
                        </div>
                        <div class="inline-flex items-center gap-3">
                            <img src="./src/images/icons/Pressure.svg" alt="Pressure icon" class="w-7 h-7">
                            <div class="text-white">
                                <span class="text-sm">Pressure</span>
                                <p class="text-lg sm:text-xl"><span id="pressure"
                                        data-location="current.main.pressure"></span>
                                    hPa</p>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="rounded-2xl bg-white/80 backdrop-blur-sm border border-solid border-white/25 p-7">
                    <div class="inline-flex gap-3 items-center">
                        <img src="./src/images/Icons/Air_Quality_Index.svg" alt="Air Quality Index Icon"
                            class="h-6 w-6" />
                        <h3 class="text-lg font-medium text-tertiary">Air Quality Index</h3>
                    </div>
                    <div class="flex justify-between gap-5 mt-5 items-center">
                        <div>
                            <h2 class="text-5xl font-semibold sm:text-7xl" data-location="aqi.list[0].main.detailed.aqi"
                                id="aqi-color">
                            </h2>
                            <h4 class="text-lg font-medium mt-2 sm:text-xl"
                                data-location="aqi.list[0].main.detailed.level" id="aqi-color"></h4>
                            <p class="text-sm mt-1 text-black/75"
                                data-location="aqi.list[0].main.detailed.recommendation">
                            </p>
                        </div>
                        <img src="./src/images/AQI_Meter.webp" alt="AQI Meter Image"
                            class="w-60 h-full hidden sm:block" />
                    </div>
                    <div
                        class="mt-8 flex items-start justify-start gap-5 flex-wrap sm:mt-13 sm:justify-between lg:justify-between">
                        <div class="text-black/60 text-center">
                            <h5>PM2.5</h5>
                            <p class="text-xl font-medium mt-2 sm:text-2xl" data-location="aqi.list[0].components.pm2_5"
                                id="aqi-color"></p>
                            <span class="text-sm">μg/m<sup>3</sup></span>
                        </div>
                        <div class="text-black/60 text-center">
                            <h5>PM10</h5>
                            <p class="text-xl font-medium mt-2 sm:text-2xl" data-location="aqi.list[0].components.pm10"
                                id="aqi-color">
                            </p>
                            <span class="text-sm">μg/m<sup>3</sup></span>
                        </div>
                        <div class="text-black/60 text-center">
                            <h5>O<sub>3</sub></h5>
                            <p class="text-xl font-medium mt-2 sm:text-2xl" data-location="aqi.list[0].components.o3"
                                id="aqi-color">
                            </p>
                            <span class="text-sm">μg/m<sup>3</sup></span>
                        </div>
                        <div class="text-black/60 text-center">
                            <h5>NO<sub>2</sub></h5>
                            <p class="text-xl font-medium mt-2 sm:text-2xl" data-location="aqi.list[0].components.no2"
                                id="aqi-color">
                            </p>
                            <span class="text-sm">μg/m<sup>3</sup></span>
                        </div>
                        <div class="text-black/60 text-center">
                            <h5>SO<sub>2</sub></h5>
                            <p class="text-xl font-medium mt-2 sm:text-2xl" data-location="aqi.list[0].components.so2"
                                id="aqi-color">
                            </p>
                            <span class="text-sm">μg/m<sup>3</sup></span>
                        </div>
                        <div class="text-black/60 text-center">
                            <h5>CO</h5>
                            <p class="text-xl font-medium mt-2 sm:text-2xl" data-location="aqi.list[0].components.co"
                                id="aqi-color">
                            </p>
                            <span class="text-sm">μg/m<sup>3</sup></span>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Here is the weather forecast information section -->
        <section class="container mx-auto px-5 mt-5 mb-10 md:px-10">
            <div id="weather-forecast" class="grid grid-cols-1 gap-5 xl:grid-cols-5 sm:grid-cols-2 md:grid-cols-3">
            </div>
        </section>

        <!-- Here is the toast message section -->
        <section id="toast-message-container"></section>
    </main>
</body>

</html>
