<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Check weather and air quality in one place. This app shows current weather, AQI, and a 5-day forecast. Search by city or use your location for quick and easy updates.">
    <meta name="keywords"
        content="weather app, air quality, AQI, weather and AQI, weather forecast, 5 day forecast, check weather, city weather, location based weather, temperature, humidity, wind, simple weather app">
    <meta name="author" content="Nazrul Hasan">
    <meta name="robots" content="index, follow">
    <script src="./src/script.js" type="module" defer></script>
    <link rel="stylesheet" href="./src/output.css" />
    <title>Weather & Air Quality App | Simple Weather and AQI Check</title>
</head>

<body class="bg-[url('./images/weather_background.jpg')] bg-cover bg-center min-h-screen">
    <!--Header -->
    <header class="container mx-auto flex items-center justify-between gap-5 flex-wrap py-5 px-10">
        <img src="./src/images/logo.webp" alt="Weather & Air Quality App Logo" class="h-12 w-auto" />
        <form method="post" id="search-weather"
            class="bg-white inline-flex items-center gap-4 rounded-2xl px-1 py-1 shadow-xl">
            <img src="./src/images/icons/Search.svg" alt="search Icon" class="w-6 h-6 ml-3" />
            <input type="search" id="city-name" name="city-name" required placeholder="Search for a city..."
                class="w-100 outline-none" />
            <button type="submit"
                class="bg-primary px-6 py-3 rounded-2xl text-white font-semibold cursor-pointer">Search</button>
        </form>
        <div id="current-location"
            class="rounded-2xl bg-white px-6 py-3 text-black cursor-pointer font-semibold inline-flex items-center gap-2 shadow-xl">
            <img src="./src/images/icons/Location.svg" alt="Location Icon" class="h-8 w-8" />
            Current Location
        </div>
    </header>

    <!-- Main Content-->
    <main>
        <!-- Recent Searches -->
        <section class="container mx-auto px-10 flex items-center justify-start gap-5 mt-5">
            <p class="text-base font-semibold">Recent Searches:</p>
            <div id="recent-search" class="inline-flex items-center flex-nowrap gap-3"></div>
        </section>

        <!-- Weather Information -->
        <section class="container mx-auto px-10">
            <div></div>
            <div class="grid grid-cols-2 gap-5 mt-5">
                <div class="rounded-2xl bg-secondary/25 backdrop-blur-sm border border-solid border-white/25 p-7">
                    <div class="flex items-center justify-between gap-5">
                        <div class="inline-flex gap-3 items-center">
                            <img src="./src/images/icons/Weather_Location.svg" alt="Location Icon" class="h-6 w-6" />
                            <h3 class="text-lg font-medium text-white" data-location="current.location">-</h3>
                        </div>
                        <div class="inline-flex items-center text-black rounded-2xl" id="temperature-toggle">
                            <button
                                class="bg-white text-black px-4 py-3 rounded-tl-2xl rounded-bl-2xl font-semibold cursor-pointer"
                                data-temperature-format="celsius">&deg;C</button>
                            <button
                                class="bg-white text-black px-4 py-3 rounded-tr-2xl rounded-br-2xl font-semibold cursor-pointer"
                                data-temperature-format="fahrenheit">&deg;F</button>
                        </div>
                    </div>
                    <p class="text-sm text-white" data-location="current.dt">-</p>
                    <div class="flex items-center justify-between gap-5 mt-5">
                        <div>
                            <h1 class="text-8xl font-semibold text-white" data-location="current.main.temp"
                                id="temp-format">-
                            </h1>
                            <p class="text-xl text-white " data-location="current.weather[0].description">-
                            </p>
                        </div>
                        <div class="w-45 h-45 overflow-hidden flex items-center justify-center">
                            <img src="https://openweathermap.org/img/wn/10d@4x.png" alt="Weather Icon" class="scale-120"
                                data-location="current.weather[0].iconUrl" />
                        </div>
                    </div>
                    <div class="border-t border-white/25 mt-3 pt-5 flex items-start justify-between gap-5">
                        <div class="inline-flex items-center gap-3">
                            <img src="./src/images/icons/Feels_Like.svg" alt="Feels Like icon" class="w-7 h-7">
                            <div class="text-white">
                                <span class="text-sm">Feels Like</span>
                                <p class="text-xl" data-location="current.main.feels_like" id="temp-format">-</p>
                            </div>
                        </div>
                        <div class="inline-flex items-center gap-3">
                            <img src="./src/images/icons/Humidity.svg" alt="Humidity icon" class="w-7 h-7">
                            <div class="text-white">
                                <span class="text-sm">Humidity</span>
                                <p class="text-xl"><span data-location="current.main.humidity">-</span>%</p>
                            </div>
                        </div>
                        <div class="inline-flex items-center gap-3">
                            <img src="./src/images/icons/Wind.svg" alt="Wind icon" class="w-7 h-7">
                            <div class="text-white">
                                <span class="text-sm">Wind</span>
                                <p class="text-xl"><span data-location="current.wind.speed">-</span> km/h</p>
                            </div>
                        </div>
                        <div class="inline-flex items-center gap-3">
                            <img src="./src/images/icons/Visibility.svg" alt="Visibility icon" class="w-7 h-7">
                            <div class="text-white">
                                <span class="text-sm">Visibility</span>
                                <p class="text-xl"><span data-location="current.visibility">-</span> km</p>
                            </div>
                        </div>
                        <div class="inline-flex items-center gap-3">
                            <img src="./src/images/icons/Pressure.svg" alt="Pressure icon" class="w-7 h-7">
                            <div class="text-white">
                                <span class="text-sm">Pressure</span>
                                <p class="text-xl"><span id="pressure" data-location="current.main.pressure">-</span>
                                    hPa</p>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="rounded-2xl bg-white/25 backdrop-blur-sm border border-solid border-white/25 p-7">
                    <div class="inline-flex gap-3 items-center">
                        <img src="./src/images/Icons/Air_Quality_Index.svg" alt="Air Quality Index Icon"
                            class="h-6 w-6" />
                        <h3 class="text-lg font-medium text-white">Air Quality Index</h3>
                    </div>
                    <div class="flex items-center justify-between gap-5 mt-5">
                        <div>
                            <h2 class="text-7xl font-semibold" data-location="aqi.list[0].main.detailed.aqi"
                                id="aqi-color">
                                -</h2>
                            <h4 class="text-xl text-medium mt-2" data-location="aqi.list[0].main.detailed.level"
                                id="aqi-color">
                                -</h4>
                            <p class="text-sm mt-1 text-white" data-location="aqi.list[0].main.detailed.recommendation">
                                -
                            </p>
                        </div>
                        <img src="./src/images/AQI_Meter.webp" alt="AQI Meter Image" class="w-60 h-full" />
                    </div>
                    <div class="border-t border-white/25 mt-8 pt-5 flex items-start justify-between gap-5">
                        <div class="text-white text-center">
                            <h5>PM2.5</h5>
                            <p class="text-2xl text-medium mt-2" data-location="aqi.list[0].components.pm2_5"
                                id="aqi-color">-</p>
                            <span class="text-sm">μg/m<sup>3</sup></span>
                        </div>
                        <div class="text-white text-center">
                            <h5>PM10</h5>
                            <p class="text-2xl text-medium mt-2" data-location="aqi.list[0].components.pm10"
                                id="aqi-color">-</p>
                            <span class="text-sm">μg/m<sup>3</sup></span>
                        </div>
                        <div class="text-white text-center">
                            <h5>O<sub>3</sub></h5>
                            <p class="text-2xl text-medium mt-2" data-location="aqi.list[0].components.o3"
                                id="aqi-color">-</p>
                            <span class="text-sm">μg/m<sup>3</sup></span>
                        </div>
                        <div class="text-white text-center">
                            <h5>NO<sub>2</sub></h5>
                            <p class="text-2xl text-medium mt-2" data-location="aqi.list[0].components.no2"
                                id="aqi-color">-</p>
                            <span class="text-sm">μg/m<sup>3</sup></span>
                        </div>
                        <div class="text-white text-center">
                            <h5>SO<sub>2</sub></h5>
                            <p class="text-2xl text-medium mt-2" data-location="aqi.list[0].components.so2"
                                id="aqi-color">-</p>
                            <span class="text-sm">μg/m<sup>3</sup></span>
                        </div>
                        <div class="text-white text-center">
                            <h5>CO</h5>
                            <p class="text-2xl text-medium mt-2" data-location="aqi.list[0].components.co"
                                id="aqi-color">-</p>
                            <span class="text-sm">μg/m<sup>3</sup></span>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Weather Forecast Information -->
    </main>

    <!-- Footer -->
    <footer>
    </footer>
</body>

</html>
